name: Tests

on:
  push:
    branches: [main]
    paths: ['src/**', 'tests/**', 'package.json']
  pull_request:
    branches: [main]
    paths: ['src/**', 'tests/**', 'package.json']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
