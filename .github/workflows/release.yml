name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
            name: macOS-ARM64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
            name: macOS-Intel
          - platform: ubuntu-22.04
            args: ''
            target: ''
            name: Linux-x64
          - platform: windows-latest
            args: ''
            target: ''
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json && rm -f src-tauri/tauri.conf.json.bak
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json && rm -f package.json.bak

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        timeout-minutes: 15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'B4cKuP T8L ${{ github.ref_name }}'
          releaseBody: 'Download B4cKuP T8L for your platform below.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Upload sig files to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET="${{ matrix.target }}"
          if [ -n "$TARGET" ]; then
            SEARCH_DIR="src-tauri/target/${TARGET}/release/bundle"
          else
            SEARCH_DIR="src-tauri/target/release/bundle"
          fi

          echo "=== All files in bundle dir ==="
          find "$SEARCH_DIR" -type f \( -name "*.sig" -o -name "*.tar.gz" -o -name "*.nsis.zip" -o -name "*.msi.zip" \) 2>/dev/null || true

          # Upload .sig files and updater bundles
          find "$SEARCH_DIR" -type f \( -name "*.sig" -o -name "*.tar.gz" -o -name "*.nsis.zip" -o -name "*.msi.zip" \) -print0 2>/dev/null | while IFS= read -r -d '' FILE; do
            BASENAME=$(basename "$FILE")
            echo "Uploading: $BASENAME"
            gh release upload "$GITHUB_REF_NAME" "$FILE" --repo "$GITHUB_REPOSITORY" --clobber || true
          done

      - name: Notarize macOS app
        if: matrix.platform == 'macos-latest'
        timeout-minutes: 45
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"

          DMG=$(find src-tauri/target/${TARGET}/release/bundle -name "*.dmg" 2>/dev/null | head -1)

          if [ -z "$DMG" ]; then
            echo "No .dmg found, skipping notarization"
            exit 0
          fi

          echo "Notarizing: $DMG"

          for ATTEMPT in 1 2 3; do
            echo "Attempt $ATTEMPT of 3..."
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait \
              --timeout 30m && break

            if [ $ATTEMPT -eq 3 ]; then
              echo "::warning::Notarization failed after 3 attempts. App is signed but not notarized."
              exit 0
            fi
            echo "Retrying in 30 seconds..."
            sleep 30
          done

          xcrun stapler staple "$DMG"
          echo "Notarization and stapling complete!"

      - name: Upload notarized DMG to release
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET="${{ matrix.target }}"
          DMG=$(find src-tauri/target/${TARGET}/release/bundle -name "*.dmg" 2>/dev/null | head -1)

          if [ -z "$DMG" ]; then
            exit 0
          fi

          gh release upload "$GITHUB_REF_NAME" "$DMG" --repo "$GITHUB_REPOSITORY" --clobber
          echo "Uploaded notarized $(basename "$DMG")"

  updater:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          sleep 15

          echo "=== Release assets ==="
          gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name'

          # Download all .sig files
          mkdir -p /tmp/sigs
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir /tmp/sigs --clobber 2>/dev/null || true

          echo "=== Downloaded .sig files ==="
          ls -la /tmp/sigs/ 2>/dev/null || echo "No .sig files found"

          # Read signature content
          read_sig() {
            local pattern="$1"
            local sig_file=$(find /tmp/sigs -name "*${pattern}*" -type f 2>/dev/null | head -1)
            if [ -n "$sig_file" ] && [ -f "$sig_file" ]; then
              cat "$sig_file"
            else
              echo ""
            fi
          }

          MAC_ARM_SIG=$(read_sig "aarch64.app.tar.gz.sig")
          MAC_X64_SIG=$(read_sig "x64.app.tar.gz.sig")
          LINUX_SIG=$(read_sig "AppImage.tar.gz.sig")
          WIN_NSIS_SIG=$(read_sig "nsis.zip.sig")

          echo "=== Signatures found ==="
          echo "macOS ARM64: $(echo "$MAC_ARM_SIG" | head -c 30)..."
          echo "macOS Intel: $(echo "$MAC_X64_SIG" | head -c 30)..."
          echo "Linux: $(echo "$LINUX_SIG" | head -c 30)..."
          echo "Windows: $(echo "$WIN_NSIS_SIG" | head -c 30)..."

          # Find correct asset names
          ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')

          MAC_ARM_ASSET=$(echo "$ASSETS" | grep "aarch64.app.tar.gz" | grep -v ".sig" | head -1)
          MAC_X64_ASSET=$(echo "$ASSETS" | grep "x64.app.tar.gz" | grep -v ".sig" | head -1)
          LINUX_ASSET=$(echo "$ASSETS" | grep "AppImage.tar.gz" | grep -v ".sig" | head -1)
          WIN_ASSET=$(echo "$ASSETS" | grep "nsis.zip" | grep -v ".sig" | head -1)

          urlencode() { echo "$1" | sed 's/ /%20/g'; }

          MAC_ARM_URL="${BASE_URL}/$(urlencode "${MAC_ARM_ASSET}")"
          MAC_X64_URL="${BASE_URL}/$(urlencode "${MAC_X64_ASSET}")"
          LINUX_URL="${BASE_URL}/$(urlencode "${LINUX_ASSET}")"
          WIN_URL="${BASE_URL}/$(urlencode "${WIN_ASSET}")"

          echo "=== URLs ==="
          echo "macOS ARM: $MAC_ARM_URL"
          echo "macOS x64: $MAC_X64_URL"
          echo "Linux: $LINUX_URL"
          echo "Windows: $WIN_URL"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "B4cKuP T8L ${TAG}" \
            --arg date "$DATE" \
            --arg mac_arm_sig "$MAC_ARM_SIG" \
            --arg mac_arm_url "$MAC_ARM_URL" \
            --arg mac_x64_sig "$MAC_X64_SIG" \
            --arg mac_x64_url "$MAC_X64_URL" \
            --arg linux_sig "$LINUX_SIG" \
            --arg linux_url "$LINUX_URL" \
            --arg win_sig "$WIN_NSIS_SIG" \
            --arg win_url "$WIN_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $date,
              platforms: {
                "darwin-aarch64": { signature: $mac_arm_sig, url: $mac_arm_url },
                "darwin-x86_64": { signature: $mac_x64_sig, url: $mac_x64_url },
                "linux-x86_64": { signature: $linux_sig, url: $linux_url },
                "windows-x86_64": { signature: $win_sig, url: $win_url }
              }
            }' > /tmp/latest.json

          echo "=== Generated latest.json ==="
          cat /tmp/latest.json

          gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber
          echo "Uploaded latest.json to release"
