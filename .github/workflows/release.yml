name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
            name: macOS-ARM64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
            name: macOS-Intel
          - platform: ubuntu-22.04
            args: ''
            target: ''
            name: Linux-x64
          - platform: windows-latest
            args: ''
            target: ''
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          # Update tauri.conf.json
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json && rm -f src-tauri/tauri.conf.json.bak
          # Update Cargo.toml
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak
          # Update package.json
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json && rm -f package.json.bak

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (sign only, no notarization)
        uses: tauri-apps/tauri-action@v0
        timeout-minutes: 15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'B4cKuP T8L ${{ github.ref_name }}'
          releaseBody: 'Download B4cKuP T8L for your platform below.'
          releaseDraft: false
          prerelease: false
          updaterJsonKeepUniversal: true
          args: ${{ matrix.args }}

      - name: Notarize macOS app
        if: matrix.platform == 'macos-latest'
        timeout-minutes: 45
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          ARCH="${TARGET%%-*}"

          # Find the .dmg or .app bundle to notarize
          DMG=$(find src-tauri/target/${TARGET}/release/bundle -name "*.dmg" 2>/dev/null | head -1)

          if [ -z "$DMG" ]; then
            echo "No .dmg found, skipping notarization"
            exit 0
          fi

          echo "Notarizing: $DMG"

          # Submit for notarization with 15 min timeout
          for ATTEMPT in 1 2 3; do
            echo "Attempt $ATTEMPT of 3..."
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait \
              --timeout 30m && break

            if [ $ATTEMPT -eq 3 ]; then
              echo "::warning::Notarization failed after 3 attempts. App is signed but not notarized."
              exit 0
            fi
            echo "Retrying in 30 seconds..."
            sleep 30
          done

          # Staple the notarization ticket
          xcrun stapler staple "$DMG"
          echo "Notarization and stapling complete!"

      - name: Upload notarized DMG to release
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"

          DMG=$(find src-tauri/target/${TARGET}/release/bundle -name "*.dmg" 2>/dev/null | head -1)

          if [ -z "$DMG" ]; then
            exit 0
          fi

          FILENAME=$(basename "$DMG")

          # Delete the unsigned DMG from the release and upload the notarized one
          gh release upload "$GITHUB_REF_NAME" "$DMG" --repo "$GITHUB_REPOSITORY" --clobber
          echo "Uploaded notarized $FILENAME"

      - name: Upload update signatures
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find and upload all .sig files and updater bundles (.tar.gz, .zip)
          TARGET="${{ matrix.target }}"
          SEARCH_DIR="src-tauri/target/${TARGET:-}/release/bundle"
          [ -z "$TARGET" ] && SEARCH_DIR="src-tauri/target/release/bundle"

          for SIG in $(find "$SEARCH_DIR" -name "*.sig" 2>/dev/null); do
            echo "Uploading signature: $(basename "$SIG")"
            gh release upload "$GITHUB_REF_NAME" "$SIG" --repo "$GITHUB_REPOSITORY" --clobber || true
          done

          # Upload updater bundles (.tar.gz for macOS, .zip for Windows/Linux)
          for BUNDLE in $(find "$SEARCH_DIR" \( -name "*.app.tar.gz" -o -name "*.msi.zip" -o -name "*.nsis.zip" -o -name "*.AppImage.tar.gz" \) 2>/dev/null); do
            echo "Uploading updater bundle: $(basename "$BUNDLE")"
            gh release upload "$GITHUB_REF_NAME" "$BUNDLE" --repo "$GITHUB_REPOSITORY" --clobber || true
          done

  updater:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          # Wait for all assets to be available
          sleep 10

          # Get all release assets
          ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')

          # Find signatures
          get_sig() {
            local pattern="$1"
            local sig_file=$(echo "$ASSETS" | grep -F "${pattern}.sig" | head -1)
            if [ -n "$sig_file" ]; then
              gh release download "$TAG" --repo "$REPO" --pattern "$sig_file" --dir /tmp --clobber
              cat "/tmp/$sig_file"
            fi
          }

          # macOS ARM64
          MAC_ARM_SIG=$(get_sig "aarch64.app.tar.gz")
          MAC_ARM_URL="${BASE_URL}/Backup.Tool_aarch64.app.tar.gz"

          # macOS Intel
          MAC_X64_SIG=$(get_sig "x64.app.tar.gz")
          MAC_X64_URL="${BASE_URL}/Backup.Tool_x64.app.tar.gz"

          # Linux
          LINUX_SIG=$(get_sig "amd64.AppImage.tar.gz")
          LINUX_URL="${BASE_URL}/Backup.Tool_${VERSION}_amd64.AppImage.tar.gz"

          # Windows NSIS
          WIN_NSIS_SIG=$(get_sig "x64-setup.exe.sig" || get_sig "x64-setup.nsis.zip")
          WIN_NSIS_URL="${BASE_URL}/Backup.Tool_${VERSION}_x64-setup.nsis.zip"

          # Windows MSI
          WIN_MSI_SIG=$(get_sig "x64_en-US.msi.zip")
          WIN_MSI_URL="${BASE_URL}/Backup.Tool_${VERSION}_x64_en-US.msi.zip"

          cat > /tmp/latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "B4cKuP T8L ${TAG}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_ARM_SIG}",
                "url": "${MAC_ARM_URL}"
              },
              "darwin-x86_64": {
                "signature": "${MAC_X64_SIG}",
                "url": "${MAC_X64_URL}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${LINUX_URL}"
              },
              "windows-x86_64": {
                "signature": "${WIN_NSIS_SIG}",
                "url": "${WIN_NSIS_URL}"
              }
            }
          }
          ENDJSON

          echo "Generated latest.json:"
          cat /tmp/latest.json

          gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber
          echo "Uploaded latest.json to release"
