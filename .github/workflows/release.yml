name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
            name: macOS-ARM64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
            name: macOS-Intel
          - platform: ubuntu-22.04
            args: ''
            target: ''
            name: Linux-x64
          - platform: windows-latest
            args: ''
            target: ''
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json && rm -f src-tauri/tauri.conf.json.bak
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json && rm -f package.json.bak

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        timeout-minutes: 15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'B4cKuP T8L ${{ github.ref_name }}'
          releaseBody: 'Download B4cKuP T8L for your platform below.'
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          updaterJsonKeepUniversal: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Notarize macOS app
        if: matrix.platform == 'macos-latest'
        timeout-minutes: 45
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          DMG=$(find src-tauri/target/${TARGET}/release/bundle -name "*.dmg" 2>/dev/null | head -1)

          if [ -z "$DMG" ]; then
            echo "No .dmg found, skipping notarization"
            exit 0
          fi

          echo "Notarizing: $DMG"

          for ATTEMPT in 1 2 3; do
            echo "Attempt $ATTEMPT of 3..."
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait \
              --timeout 30m && break

            if [ $ATTEMPT -eq 3 ]; then
              echo "::warning::Notarization failed after 3 attempts."
              exit 0
            fi
            sleep 30
          done

          xcrun stapler staple "$DMG"
          gh release upload "$GITHUB_REF_NAME" "$DMG" --repo "$GITHUB_REPOSITORY" --clobber
          echo "Uploaded notarized $(basename "$DMG")"

  updater:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          sleep 10

          echo "=== Release assets ==="
          gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name'

          # Download update bundles from release and sign them
          mkdir -p /tmp/bundles
          gh release download "$TAG" --repo "$REPO" --pattern "*.app.tar.gz" --dir /tmp/bundles --clobber 2>/dev/null || true
          gh release download "$TAG" --repo "$REPO" --pattern "*.AppImage" --dir /tmp/bundles --clobber 2>/dev/null || true
          gh release download "$TAG" --repo "$REPO" --pattern "*x64-setup.exe" --dir /tmp/bundles --clobber 2>/dev/null || true

          echo "=== Downloaded bundles ==="
          ls -la /tmp/bundles/ 2>/dev/null || echo "Empty"

          # Sign each bundle with tauri signer
          sign_bundle() {
            local file="$1"
            if [ -f "$file" ]; then
              >&2 echo "Signing: $(basename "$file")"
              >&2 npx tauri signer sign -k "$TAURI_SIGNING_PRIVATE_KEY" -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" "$file" || true
              >&2 echo "Looking for sig at: ${file}.sig"
              >&2 ls -la "${file}.sig" 2>/dev/null || >&2 echo "  NOT FOUND"
              # Also check if sig was placed next to the file without the full path
              >&2 ls -la "$(dirname "$file")/"*.sig 2>/dev/null || true
              if [ -f "${file}.sig" ]; then
                cat "${file}.sig"
              fi
            fi
          }

          MAC_ARM_FILE=$(find /tmp/bundles -name "*aarch64*app.tar.gz" -type f 2>/dev/null | head -1)
          MAC_X64_FILE=$(find /tmp/bundles -name "*x64*app.tar.gz" -type f 2>/dev/null | head -1)
          LINUX_FILE=$(find /tmp/bundles -name "*AppImage" -type f 2>/dev/null | head -1)
          WIN_FILE=$(find /tmp/bundles -name "*x64-setup.exe" -type f 2>/dev/null | head -1)

          MAC_ARM_SIG=$(sign_bundle "$MAC_ARM_FILE")
          MAC_X64_SIG=$(sign_bundle "$MAC_X64_FILE")
          LINUX_SIG=$(sign_bundle "$LINUX_FILE")
          WIN_SIG=$(sign_bundle "$WIN_FILE")

          [ -n "$MAC_ARM_SIG" ] && echo "macOS ARM: found" || echo "macOS ARM: MISSING"
          [ -n "$MAC_X64_SIG" ] && echo "macOS x64: found" || echo "macOS x64: MISSING"
          [ -n "$LINUX_SIG" ] && echo "Linux: found" || echo "Linux: MISSING"
          [ -n "$WIN_SIG" ] && echo "Windows: found" || echo "Windows: MISSING"

          ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')

          MAC_ARM_ASSET=$(echo "$ASSETS" | grep "aarch64.app.tar.gz$" | head -1)
          MAC_X64_ASSET=$(echo "$ASSETS" | grep "x64.app.tar.gz$" | head -1)
          LINUX_ASSET=$(echo "$ASSETS" | grep "AppImage$" | head -1)
          WIN_ASSET=$(echo "$ASSETS" | grep "x64-setup.exe$" | head -1)

          urlencode() { python3 -c "import urllib.parse; print(urllib.parse.quote('$1', safe=''))"; }

          MAC_ARM_URL="${BASE_URL}/$(urlencode "${MAC_ARM_ASSET}")"
          MAC_X64_URL="${BASE_URL}/$(urlencode "${MAC_X64_ASSET}")"
          LINUX_URL="${BASE_URL}/$(urlencode "${LINUX_ASSET}")"
          WIN_URL="${BASE_URL}/$(urlencode "${WIN_ASSET}")"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "B4cKuP T8L ${TAG}" \
            --arg date "$DATE" \
            --arg mac_arm_sig "$MAC_ARM_SIG" \
            --arg mac_arm_url "$MAC_ARM_URL" \
            --arg mac_x64_sig "$MAC_X64_SIG" \
            --arg mac_x64_url "$MAC_X64_URL" \
            --arg linux_sig "$LINUX_SIG" \
            --arg linux_url "$LINUX_URL" \
            --arg win_sig "$WIN_SIG" \
            --arg win_url "$WIN_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $date,
              platforms: {
                "darwin-aarch64": { signature: $mac_arm_sig, url: $mac_arm_url },
                "darwin-x86_64": { signature: $mac_x64_sig, url: $mac_x64_url },
                "linux-x86_64": { signature: $linux_sig, url: $linux_url },
                "windows-x86_64": { signature: $win_sig, url: $win_url }
              }
            }' > /tmp/latest.json

          echo "=== latest.json ==="
          cat /tmp/latest.json

          gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber
          echo "Done!"
