name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
            name: macOS-ARM64
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
            name: macOS-Intel
          - platform: ubuntu-22.04
            args: ''
            target: ''
            name: Linux-x64
          - platform: windows-latest
            args: ''
            target: ''
            name: Windows-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setting version to $VERSION"
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json && rm -f src-tauri/tauri.conf.json.bak
          sed -i.bak "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak
          sed -i.bak "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" package.json && rm -f package.json.bak

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build Tauri app
        shell: bash
        timeout-minutes: 15
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npx tauri build --target ${{ matrix.target }}
          else
            npx tauri build
          fi

      - name: Create release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
          gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --title "B4cKuP T8L $GITHUB_REF_NAME" \
            --notes "Download B4cKuP T8L for your platform below."

      - name: Upload all artifacts to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TARGET="${{ matrix.target }}"
          if [ -n "$TARGET" ]; then
            SEARCH_DIR="src-tauri/target/${TARGET}/release/bundle"
          else
            SEARCH_DIR="src-tauri/target/release/bundle"
          fi

          echo "=== All bundle files ==="
          find "$SEARCH_DIR" -type f 2>/dev/null | sort

          # Upload each relevant file
          find "$SEARCH_DIR" -type f \( \
            -name "*.dmg" -o -name "*.deb" -o -name "*.rpm" \
            -o -name "*.AppImage" -o -name "*.exe" -o -name "*.msi" \
            -o -name "*.sig" -o -name "*.tar.gz" \
            -o -name "*.nsis.zip" -o -name "*.msi.zip" \
          \) -print0 2>/dev/null | while IFS= read -r -d '' FILE; do
            echo "Uploading: $(basename "$FILE")"
            gh release upload "$GITHUB_REF_NAME" "$FILE" --repo "$GITHUB_REPOSITORY" --clobber || true
          done

      - name: Notarize macOS app
        if: matrix.platform == 'macos-latest'
        timeout-minutes: 45
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TARGET="${{ matrix.target }}"
          DMG=$(find src-tauri/target/${TARGET}/release/bundle -name "*.dmg" 2>/dev/null | head -1)

          if [ -z "$DMG" ]; then
            echo "No .dmg found, skipping notarization"
            exit 0
          fi

          echo "Notarizing: $DMG"

          for ATTEMPT in 1 2 3; do
            echo "Attempt $ATTEMPT of 3..."
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait \
              --timeout 30m && break

            if [ $ATTEMPT -eq 3 ]; then
              echo "::warning::Notarization failed after 3 attempts."
              exit 0
            fi
            sleep 30
          done

          xcrun stapler staple "$DMG"
          gh release upload "$GITHUB_REF_NAME" "$DMG" --repo "$GITHUB_REPOSITORY" --clobber
          echo "Uploaded notarized $(basename "$DMG")"

  updater:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"

          echo "=== Release assets ==="
          gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name'

          # Download all sig files from release
          mkdir -p /tmp/sigs
          gh release download "$TAG" --repo "$REPO" --pattern "*.sig" --dir /tmp/sigs --clobber 2>/dev/null || true
          echo "=== Downloaded sigs ==="
          ls -la /tmp/sigs/ 2>/dev/null || echo "Empty"

          read_sig() {
            local pattern="$1"
            local sig_file=$(find /tmp/sigs -name "*${pattern}*" -type f 2>/dev/null | head -1)
            if [ -n "$sig_file" ] && [ -f "$sig_file" ]; then
              cat "$sig_file"
            fi
          }

          MAC_ARM_SIG=$(read_sig "aarch64.app.tar.gz.sig")
          MAC_X64_SIG=$(read_sig "x64.app.tar.gz.sig")
          LINUX_SIG=$(read_sig "AppImage.tar.gz.sig")
          WIN_SIG=$(read_sig "nsis.zip.sig")

          echo "=== Signatures ==="
          [ -n "$MAC_ARM_SIG" ] && echo "macOS ARM: found" || echo "macOS ARM: MISSING"
          [ -n "$MAC_X64_SIG" ] && echo "macOS x64: found" || echo "macOS x64: MISSING"
          [ -n "$LINUX_SIG" ] && echo "Linux: found" || echo "Linux: MISSING"
          [ -n "$WIN_SIG" ] && echo "Windows: found" || echo "Windows: MISSING"

          ASSETS=$(gh release view "$TAG" --repo "$REPO" --json assets --jq '.assets[].name')

          MAC_ARM_ASSET=$(echo "$ASSETS" | grep "aarch64.app.tar.gz$" | head -1)
          MAC_X64_ASSET=$(echo "$ASSETS" | grep "x64.app.tar.gz$" | head -1)
          LINUX_ASSET=$(echo "$ASSETS" | grep "AppImage.tar.gz$" | head -1)
          WIN_ASSET=$(echo "$ASSETS" | grep "nsis.zip$" | head -1)

          urlencode() { python3 -c "import urllib.parse; print(urllib.parse.quote('$1', safe=''))"; }

          MAC_ARM_URL="${BASE_URL}/$(urlencode "${MAC_ARM_ASSET}")"
          MAC_X64_URL="${BASE_URL}/$(urlencode "${MAC_X64_ASSET}")"
          LINUX_URL="${BASE_URL}/$(urlencode "${LINUX_ASSET}")"
          WIN_URL="${BASE_URL}/$(urlencode "${WIN_ASSET}")"

          jq -n \
            --arg version "$VERSION" \
            --arg notes "B4cKuP T8L ${TAG}" \
            --arg date "$DATE" \
            --arg mac_arm_sig "$MAC_ARM_SIG" \
            --arg mac_arm_url "$MAC_ARM_URL" \
            --arg mac_x64_sig "$MAC_X64_SIG" \
            --arg mac_x64_url "$MAC_X64_URL" \
            --arg linux_sig "$LINUX_SIG" \
            --arg linux_url "$LINUX_URL" \
            --arg win_sig "$WIN_SIG" \
            --arg win_url "$WIN_URL" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $date,
              platforms: {
                "darwin-aarch64": { signature: $mac_arm_sig, url: $mac_arm_url },
                "darwin-x86_64": { signature: $mac_x64_sig, url: $mac_x64_url },
                "linux-x86_64": { signature: $linux_sig, url: $linux_url },
                "windows-x86_64": { signature: $win_sig, url: $win_url }
              }
            }' > /tmp/latest.json

          echo "=== latest.json ==="
          cat /tmp/latest.json

          gh release upload "$TAG" /tmp/latest.json --repo "$REPO" --clobber
          echo "Done!"
