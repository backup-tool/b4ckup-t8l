<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background radial gradient for subtle depth -->
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1510" stop-opacity="1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </radialGradient>
    <!-- Divider vertical gradient (matches website) -->
    <linearGradient id="dividerGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4ade80" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </linearGradient>
    <!-- T8L gradient green → cyan -->
    <linearGradient id="subGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Subtle green glow for accent line under tagline -->
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0"/>
      <stop offset="50%" stop-color="#4ade80" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Very subtle grid lines (decorative) -->
  <g opacity="0.04" stroke="#4ade80" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Logo (centered horizontally, positioned top) -->
  <g transform="translate(516, 90) scale(0.33)">
    <rect width="512" height="512" rx="80" fill="#000000"/>
    <path d="M256 72 L408 138 L408 280 Q408 388 256 448 Q104 388 104 280 L104 138 Z"
          fill="none" stroke="#4ade80" stroke-width="36" stroke-linejoin="round"/>
    <path d="M256 190 L256 348" stroke="#ffffff" stroke-width="40" stroke-linecap="round"/>
    <path d="M186 260 L256 190 L326 260" stroke="#ffffff" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="200" y1="348" x2="312" y2="348" stroke="#4ade80" stroke-width="24" stroke-linecap="round"/>
  </g>

  <!-- Brand title: "B4cKuP | T8L" matching website design -->
  <!-- "B4cKuP" in white -->
  <text x="445" y="385" text-anchor="end"
        font-family="'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="110" font-weight="700" letter-spacing="-2" fill="#f1f5f9">B4cKuP</text>

  <!-- Vertical divider (gradient green) -->
  <rect x="595" y="303" width="4" height="100" fill="url(#dividerGradient)" rx="2"/>

  <!-- "T8L" with green→cyan gradient -->
  <text x="625" y="385" text-anchor="start"
        font-family="'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="110" font-weight="300" letter-spacing="10" fill="url(#subGradient)">T8L</text>

  <!-- Tagline -->
  <text x="600" y="455" text-anchor="middle"
        font-family="'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="28" font-weight="400" fill="#d4d4d8">Track, manage and monitor all your backups</text>

  <!-- Accent line -->
  <rect x="450" y="495" width="300" height="3" fill="url(#accentLine)" rx="1.5"/>

  <!-- Footer subtitle -->
  <text x="600" y="550" text-anchor="middle"
        font-family="'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="20" font-weight="400" fill="#71717a" letter-spacing="3">FREE · OPEN SOURCE · CROSS-PLATFORM</text>
</svg>
